<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Το Καλάθι μου - LogoFood</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-light">


    <header class="custom-header py-4 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0 custom-header-text fw-bold">
                <a href="browse.html" class="text-decoration-none text-dark" id="logo">logofood</a>
            </h1>
            <div class="d-flex gap-2">
                <a href="cart.html" class="btn btn-custom btn-sm fw-bold">
                    Καλάθι <span id="cartBadge" class="badge custom-number ms-1">0</span>
                </a>
                <div id="authNav" class="d-flex align-items-center"></div>
            </div>
        </div>
    </header>

    <main class="container my-5">
        <h2 class="fw-bold mb-4">Το Καλάθι σου (´｡• ᵕ •｡`) ♡</h2>

        <div class="row g-4">
            <div class="col-lg-8">
                <!-- Guest Address Section -->
                <div class="card border-0 shadow-sm mb-4 d-none" id="guestAddressSection">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4">
                            <span class="badge custom-number me-2">1</span>Στοιχεία Παράδοσης
                        </h5>
                        <div class="row g-3">
                            <div class="col-md-5">
                                <label for="guestStreet" class="form-label text-muted small fw-bold">Οδός</label>
                                <input type="text" id="guestStreet" class="form-control" placeholder="π.χ. Ερμού">
                            </div>
                            <div class="col-md-3">
                                <label for="guestNumber" class="form-label text-muted small fw-bold">Αριθμός</label>
                                <input type="text" id="guestNumber" class="form-control" placeholder="Αρ.">
                            </div>
                            <div class="col-md-4">
                                <label for="guestZip" class="form-label text-muted small fw-bold">Τ.Κ.</label>
                                <input type="text" id="guestZip" class="form-control" placeholder="Τ.Κ.">
                            </div>
                            <div class="col-md-12">
                                <label for="guestFloor"
                                    class="form-label text-muted small fw-bold">Όροφος/Κουδούνι</label>
                                <input type="text" id="guestFloor" class="form-control"
                                    placeholder="π.χ. 3ος / Παπαδόπουλος">
                            </div>
                            <div class="col-12">
                                <label for="guestComments" class="form-label text-muted small fw-bold">Σχόλια για τον
                                    διανομέα</label>
                                <textarea id="guestComments" class="form-control" rows="2"
                                    placeholder="π.χ. Το κουδούνι δεν λειτουργεί, πάρτε με τηλέφωνο"></textarea>
                            </div>
                        </div>
                        <div class="mb-2 mt-3">
                            <button type="button" id="toggleGuestMap" class="btn btn-outline-secondary w-100 mb-2 fw-bold border rounded">
                            📍 Επιλογή στο χάρτη
                            </button>

                            <div id="guestMapContainer" class="d-none mt-3">
                                <div class="mb-3 position-relative">
                                    <label for="guestAddressSearch" class="form-label">Αναζήτηση διεύθυνσης</label>
                                    <input type="text" id="guestAddressSearch" class="form-control"
                                        placeholder="π.χ. Ερμού 12" autocomplete="off">
                                    <div id="guestAddressResults" class="list-group mt-2 d-none"></div>
                                </div>
                                <div id="guestCartMap" style="height: 300px; border-radius: 16px;"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Logged In Address Section -->
                <div class="card border-0 shadow-sm mb-4 d-none" id="loggedAddressSection">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4">
                            <span class="badge custom-number me-2">1</span>Στοιχεία Παράδοσης
                        </h5>
                        <div class="mb-2">
                            <div class="accordion" id="addressAccordion">
                                <div class="accordion-item">
                                    <h2 class="accordion-header" id="addressHeading">
                                        <button class="accordion-button collapsed" type="button"
                                            data-bs-toggle="collapse" data-bs-target="#addressCollapse"
                                            aria-expanded="false" aria-controls="addressCollapse">
                                            Επιλογή αποθηκευμένης διεύθυνσης
                                        </button>
                                    </h2>
                                    <div id="addressCollapse" class="accordion-collapse collapse"
                                        aria-labelledby="addressHeading" data-bs-parent="#addressAccordion">
                                        <div class="accordion-body p-0">
                                            <div class="list-group" id="cartAddressList">
                                                <!-- Addresses injected by JS -->
                                            </div>
                                            <button type="button" id="cartToggleAddForm"
                                                class="btn btn-outline-secondary btn-sm fw-bold w-100 py-2 mt-3"
                                                style="border-style: dashed;">
                                                + Προσθήκη νέας διεύθυνσης
                                            </button>
                                            <div id="cartInlineAddressForm" class="d-none mt-2 px-2 pb-2">
                                                <div class="row g-2 align-items-end mb-2">
                                                    <div class="col-6">
                                                        <input type="text" id="cartNewStreet"
                                                            class="form-control form-control-sm"
                                                            placeholder="π.χ. Ερμού">
                                                    </div>
                                                    <div class="col-3">
                                                        <input type="text" id="cartNewNumber"
                                                            class="form-control form-control-sm" placeholder="Αρ.">
                                                    </div>
                                                    <div class="col-3">
                                                        <input type="text" id="cartNewZipCode"
                                                            class="form-control form-control-sm" placeholder="Τ.Κ.">
                                                    </div>
                                                </div>
                                                
                                                <button type="button" id="toggleCartMap" class="btn btn-outline-secondary w-100 mt-2 mb-2 fw-bold border rounded">
                                                📍 Επιλογή στο χάρτη
                                                </button>

                                                <div id="cartMapContainer" class="d-none mt-3">
                                                <div class="mb-3 position-relative">
                                                    <label for="cartAddressSearch" class="form-label">Αναζήτηση διεύθυνσης</label>
                                                    <input
                                                    type="text"
                                                    id="cartAddressSearch"
                                                    class="form-control"
                                                    placeholder="π.χ. Ερμού 12"
                                                    autocomplete="off"
                                                    >
                                                    <div id="cartAddressResults" class="list-group mt-2 d-none"></div>
                                                </div>

                                                <div id="cartMap" style="height: 300px; border-radius: 16px;"></div>
                                                </div>
                                                                                                <button id="cartSaveAddress" class="btn btn-menu btn-sm w-100 fw-bold">✓ Προσθήκη</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4">
                            <span class="badge custom-number me-2">2</span>Η Παραγγελία σου
                        </h5>


                        <div id="cartItemsContainer">
                            <!-- Items dynamically injected here -->
                        </div>
                    </div>
                </div>




                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4">
                            <span class="badge custom-number me-2">3</span>Τρόπος Πληρωμής
                        </h5>

                        <div class="form-check border p-3 rounded mb-3">
                            <input class="form-check-input mt-2 ms-0 me-3" type="radio" name="paymentOption" id="card"
                                checked>
                            <label class="form-check-label fw-bold d-flex align-items-center" for="card">
                                Πιστωτική / Χρεωστική Κάρτα
                            </label>
                            <div class="mt-2 text-muted small ms-4 ps-2">Θα μεταφερθείτε σε ασφαλές περιβάλλον τράπεζας.
                            </div>
                        </div>

                        <div class="form-check border p-3 rounded">
                            <input class="form-check-input mt-2 ms-0 me-3" type="radio" name="paymentOption" id="cash">
                            <label class="form-check-label fw-bold" for="cash">
                                Μετρητά κατά την παράδοση
                            </label>
                        </div>
                    </div>
                </div>

            </div>


            <div class="col-lg-4">
                <div class="card border-0 shadow-sm sticky-top" style="top: 2rem;">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4 text-center">Σύνοψη Παραγγελίας</h5>

                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Αξία προϊόντων</span>
                            <span id="cartSubtotal">0.00€</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Κόστος Διανομής</span>
                            <span>1.00€</span>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mt-4 mb-4">
                            <span class="h5 fw-bold mb-0">Σύνολο Τιμής</span>
                            <span class="h4 fw-bold mb-0 text-danger" id="cartTotal">1.00€</span>
                        </div>


                        <button class="btn btn-menu btn-lg w-100 fw-bold">Παραγγελία Τώρα!</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="../js/script.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/cart.js"></script>
</body>

</html>
