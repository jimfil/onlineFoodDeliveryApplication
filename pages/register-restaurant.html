<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Εγγραφή Εστιατορίου - LogoFood</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-light">

    <header class="custom-header py-4 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0 custom-header-text fw-bold">
                <a href="browse.html" class="text-decoration-none text-dark" id="logo">logofood</a>
            </h1>
            <div class="d-flex gap-2">
                <a href="cart.html" class="btn btn-custom btn-sm fw-bold">
                    Καλάθι <span class="badge custom-number ms-1">0</span>
                </a>
                <a href="login.html" class="btn btn-sm fw-bold text-auth">Σύνδεση/Εγγραφή</a>
            </div>
        </div>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card border-0 shadow-sm p-4">
                    <h2 class="fw-bold mb-4 text-center">Δημιουργία Λογαριασμού Εστιατορίου</h2>

                    <form>
                        <div class="row g-3">

                            <div class="col-md-7">
                                <label for="businessName" class="form-label text-muted small fw-bold">Όνομα
                                    Επιχείρησης</label>
                                <input type="text" id="businessName" class="form-control" placeholder="Γκούντης"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <label for="firstNameOwner" class="form-label text-muted small fw-bold">Όνομα
                                    Ιδιοκτήτη</label>
                                <input type="text" id="firstNameOwner" class="form-control" placeholder="Γιώργος"
                                    pattern="[A-Za-zΑ-Ωα-ωΆΈΉΊΌΎΏάέήίόύώ\s\-]+" title="Παρακαλώ εισάγετε μόνο γράμματα"
                                    required>
                            </div>

                            <div class="col-md-6">
                                <label for="lastNameOwner" class="form-label text-muted small fw-bold">Επώνυμο
                                    Ιδιοκτήτη</label>
                                <input type="text" id="lastNameOwner" class="form-control" placeholder="Παπαδόπουλος"
                                    pattern="[A-Za-zΑ-Ωα-ωΆΈΉΊΌΎΏάέήίόύώ\s\-]+" title="Παρακαλώ εισάγετε μόνο γράμματα"
                                    required>
                            </div>

                            <div class="col-md-5">
                                <label for="afm" class="form-label text-muted small fw-bold">Α.Φ.Μ.</label>
                                <input type="text" id="afm" class="form-control" placeholder="123456789"
                                    pattern="[0-9]{9}" title="Το ΑΦΜ πρέπει να αποτελείται από ακριβώς 9 ψηφία"
                                    required>
                            </div>


                            <div class="col-12">
                                <label for="emailOwner" class="form-label text-muted small fw-bold">Email</label>
                                <input type="email" id="emailOwner" class="form-control"
                                    placeholder="example@example.com" required>
                            </div>

                            <div class="col-12">
                                <label for="password" class="form-label text-muted small fw-bold">Κωδικός
                                    Πρόσβασης</label>
                                <input type="password" id="password" class="form-control"
                                    placeholder="Τουλάχιστον 6 χαρακτήρες" pattern=".{6,}"
                                    title="Ο κωδικός πρέπει να περιέχει τουλάχιστον 6 χαρακτήρες" required>
                            </div>

                            <div class="col-12">
                                <label for="confirmPassword" class="form-label text-muted small fw-bold">Επιβεβαίωση
                                    Κωδικού</label>
                                <input type="password" id="confirmPassword" class="form-control"
                                    placeholder="Επαναλάβετε τον κωδικό" pattern=".{6,}"
                                    title="Ο κωδικός πρέπει να περιέχει τουλάχιστον 6 χαρακτήρες" required>
                            </div>

                            <div class="col-12">
                                <label for="phone" class="form-label text-muted small fw-bold">Τηλέφωνο</label>
                                <input type="tel" id="phone" class="form-control" placeholder="69xxxxxxxx"
                                    pattern="69[0-9]{8}"
                                    title="Ο αριθμός πρέπει να είναι κινητό τηλέφωνο 10 ψηφίων (ξεκινάει από 69), π.χ. 6912345678"
                                    required>
                            </div>

                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-menu btn-lg w-100 fw-bold">Δημιουργία Λογαριασμού
                                </button>
                            </div>

                            <div class="col-12 text-center mt-3">
                                <a href="login.html" class="text-decoration-none text-muted small">Έχετε ήδη λογαριασμό?
                                    Συνδεθείτε</a>
                            </div>

                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/register-restaurant.js"></script>
</body>

</html>
