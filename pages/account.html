<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ο Λογαριασμός Μου - LogoFood</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-light">

    <header class="custom-header py-4 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0 custom-header-text fw-bold">
                <a href="browse.html" class="text-decoration-none text-dark" id="logo">logofood</a>
            </h1>
            <div class="d-flex gap-2 align-items-center">
                <a href="cart.html" class="btn btn-custom btn-sm fw-bold">
                    Καλάθι <span id="cartBadge" class="badge custom-number ms-1">0</span>
                </a>
                <div id="authNav" class="d-flex align-items-center">
                    <!-- Auth nav will be dynamically injected here -->
                </div>
            </div>
        </div>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <h2 class="fw-bold mb-4 text-center">Διαχείριση Λογαριασμού</h2>

                <!-- Change Name Form -->
                <div class="card border-0 shadow-sm p-4 mb-4">
                    <h4 class="fw-bold mb-3">Προφίλ</h4>
                    <form id="updateNameForm">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label for="accountFirstName" class="form-label text-muted small fw-bold">Όνομα</label>
                                <input type="text" id="accountFirstName" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label for="accountLastName" class="form-label text-muted small fw-bold">Επώνυμο</label>
                                <input type="text" id="accountLastName" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label for="accountPhone" class="form-label text-muted small fw-bold">Τηλέφωνο</label>
                                <input type="tel" id="accountPhone" class="form-control" required>
                            </div>
                            <div class="col-12 mt-3 text-end">
                                <button type="submit" class="btn btn-menu fw-bold px-4">Αποθήκευση</button>
                            </div>
                        </div>
                        <div id="nameSuccessMsg" class="text-success small mt-2 d-none">Το όνομα ενημερώθηκε επιτυχώς!</div>
                    </form>
                </div>

                <!-- Addresses Section -->
                <div class="card border-0 shadow-sm p-4 mb-4">
                    <h4 class="fw-bold mb-3">Διευθύνσεις Παράδοσης</h4>

                    <div class="accordion mb-3" id="accountAddressAccordion">
                        <div class="accordion-item border-0 shadow-sm">
                            <h2 class="accordion-header" id="accountAddressHeading">
                                <button class="accordion-button collapsed fw-bold" type="button"
                                    data-bs-toggle="collapse" data-bs-target="#accountAddressCollapse"
                                    aria-expanded="false" aria-controls="accountAddressCollapse">
                                    Οι διευθύνσεις μου
                                </button>
                            </h2>
                            <div id="accountAddressCollapse" class="accordion-collapse collapse"
                                aria-labelledby="accountAddressHeading" data-bs-parent="#accountAddressAccordion">
                                <div class="accordion-body p-0">
                                    <div class="list-group" id="addressList">
                                        <!-- Addresses injected by JS -->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <h5 class="fw-bold mb-3 h6">Προσθήκη Νέας Διεύθυνσης</h5>
                    <form id="addAddressForm">
                        <div class="row g-3">
                            <div class="col-md-5">
                                <label for="newStreet" class="form-label text-muted small fw-bold">Οδός</label>
                                <input type="text" id="newStreet" class="form-control" placeholder="π.χ. Ερμού" required>
                            </div>
                            <div class="col-md-2">
                                <label for="newStreetNumber" class="form-label text-muted small fw-bold">Αριθμός</label>
                                <input type="text" id="newStreetNumber" class="form-control" placeholder="π.χ. 12" required>
                            </div>
                            <div class="col-md-2">
                                <label for="newZipCode" class="form-label text-muted small fw-bold">Τ.Κ.</label>
                                <input type="text" id="newZipCode" class="form-control" placeholder="10563" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <button type="button" class="btn btn-sm btn-outline-secondary w-100 mb-2 fw-bold" id="toggleAccountMap">
                                📍 Επιλογή στο χάρτη
                            </button>
                            <div id="accountMapContainer" class="d-none shadow-sm rounded overflow-hidden mb-3" style="height: 250px; border: 1px solid #dee2e6;">
                                <div id="accountMap" style="height: 100%;"></div>
                            </div>
                        </div>

                        <div class="text-end">
                            <button type="submit" class="btn btn-menu fw-bold px-4">Προσθήκη Διεύθυνσης</button>
                        </div>
                    </form>
                </div>


                <!-- Change Password Form -->
                <div class="card border-0 shadow-sm p-4">
                    <h4 class="fw-bold mb-3">Ασφάλεια</h4>
                    <form id="updatePasswordForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="currentPassword" class="form-label text-muted small fw-bold">Τρέχων Κωδικός</label>
                                <input type="password" id="currentPassword" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label for="newPassword" class="form-label text-muted small fw-bold">Νέος Κωδικός</label>
                                <input type="password" id="newPassword" class="form-control" pattern=".{6,}" title="Τουλάχιστον 6 χαρακτήρες" required>
                            </div>
                            <div class="col-12 text-end mt-3">
                                <button type="submit" class="btn btn-menu fw-bold px-4">Αλλαγή Κωδικού</button>
                            </div>
                        </div>
                        <div id="passwordSuccessMsg" class="text-success small mt-2 d-none">Ο κωδικός ενημερώθηκε επιτυχώς!</div>
                    </form>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="../js/utils.js"></script>
    <script src="../js/account.js"></script>
</body>

</html>
