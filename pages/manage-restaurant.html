<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Διαχείριση Καταστήματος - logofood</title>
    
    <!-- Project Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Project Stylesheet -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <header class="custom-header py-4 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0 custom-header-text fw-bold">
                <a href="browse.html" class="text-decoration-none" id="logo">logofood</a>
            </h1>
            <div class="d-flex gap-3 align-items-center">
                <span class="fw-bold text-light small"><i class="bi bi-shop me-2"></i>Γκούντης (Admin)</span>
                <a href="account.html" class="btn btn-sm fw-bold text-auth">Ο Λογαριασμός Μου</a>
            </div>
        </div>
    </header>

    <main class="container dashboard-container">
        <div class="row mb-5 text-center text-md-start">
            <div class="col-12">
                <h2 class="fw-bold mb-1">Πίνακας Ελέγχου Μενού</h2>
                <p class="text-muted">Διαχειριστείτε τις κατηγορίες και τα προϊόντα του καταστήματός σας.</p>
            </div>
        </div>

        <div class="row g-4">
            <!-- Restaurant Settings Column -->
            <div class="col-lg-12 mb-2">
                <div class="glass-card" style="border-left-color: var(--primary);">
                    <h5 class="fw-bold mb-4" style="color: var(--primary);">Ρυθμίσεις Καταστήματος</h5>
                    <form id="settingsForm" class="row g-3 align-items-end">
                        <div class="col-md-5">
                            <label class="form-label">Όνομα Καταστήματος</label>
                            <input type="text" id="settingsName" class="form-control" required>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">Εκτιμώμενος Χρόνος Προετοιμασίας (λ.)</label>
                            <input type="text" id="prepTime" class="form-control" placeholder="π.χ. 20-30 λεπτά" required>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-dashboard-submit w-100">Αποθήκευση</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Add Product Column -->
            <div class="col-lg-4">
                <div class="glass-card">
                    <h5 class="fw-bold mb-4" style="color: var(--primary);">Προσθήκη Προϊόντος</h5>
                    <form id="productForm">
                        <div class="mb-3">
                            <label class="form-label">Όνομα Προϊόντος</label>
                            <input type="text" id="name" class="form-control" placeholder="π.χ. Burger Classic" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Κατηγορία</label>
                            <select id="categorySelect" class="form-select" required>
                                <option value="" disabled selected>Επιλέξτε κατηγορία...</option>
                                <!-- Categories populated via JS -->
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Τιμή (€)</label>
                            <input type="number" id="price" class="form-control" step="0.01" placeholder="0.00" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Περιγραφή</label>
                            <textarea id="description" class="form-control" rows="3" placeholder="Συστατικά, λεπτομέρειες..."></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Εικόνα (URL)</label>
                            <input type="url" id="imageUrl" class="form-control" placeholder="https://example.com/image.jpg">
                        </div>

                        <button type="submit" class="btn btn-dashboard-submit w-100">
                            <i class="bi bi-plus-lg me-2"></i>Προσθήκη στο Μενού
                        </button>
                    </form>
                </div>
            </div>

            <!-- List Products Column -->
            <div class="col-lg-8">
                <div class="glass-card" style="border-left-color: var(--primary);">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold mb-0" style="color: var(--primary);">Ενεργό Μενού</h5>
                        <div class="input-group input-group-sm w-auto">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                            <input type="text" class="form-control border-start-0" placeholder="Αναζήτηση...">
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table align-middle border-top">
                            <thead>
                                <tr class="text-muted small">
                                    <th class="border-0 py-3">ΠΡΟΪΟΝ</th>
                                    <th class="border-0 py-3">ΚΑΤΗΓΟΡΙΑ</th>
                                    <th class="border-0 py-3">ΤΙΜΗ</th>
                                    <th class="border-0 py-3 text-end">ΕΝΕΡΓΕΙΕΣ</th>
                                </tr>
                            </thead>
                            <tbody id="menuTableBody">
                                <!-- Menu items populated via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="container py-4 text-center">
        <p class="small text-muted">&copy; 2026 logofood - Διαχείριση Καταστήματος</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/manage-restaurant.js"></script>
</body>

</html>
