<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodApp - Παραγγελία Φαγητού</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">
    <header class="custom-header py-4 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0 custom-header-text fw-bold">Logo FoodApp</h1>
            <div class="d-flex gap-2">
                <button class="btn btn-custom btn-sm fw-bold">
                    Καλάθι <span class="badge custom-number ms-1">0</span>
                </button>
                <button class="btn btn-sm fw-bold text-dark">
                    Σύνδεση/Εγγραφή
                </button>
            </div>
        </div>
    </header>

    <section class="container my-5 text-center">
        <h2 class="fw-bold mb-4">Πίτσα Μπάλα και Φασάρα</h2>
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="d-flex gap-2">
                    <input type="text" class="form-control form-control-lg"
                        placeholder="π.χ. Μαγαζί ή Πίτσα, Σουβλάκια ...">
                    <button class="btn btn-dark btn-lg px-4">Εύρεση</button>
                </div>
            </div>
        </div>
    </section>




</body>

</html>
