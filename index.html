<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogoFood - Καλωσήρθατε</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="position-absolute top-0 end-0 p-4">
        <div id="authNav" class="d-flex gap-2 align-items-center bg-white p-2 rounded shadow-sm">
            <a href="pages/login.html" class="btn btn-sm fw-bold text-auth"
                style="background-color: #9c69d8;">Σύνδεση/Εγγραφή</a>
        </div>
    </div>

    <div class="landing-wrapper px-3">
        <h1 class="landing-logo mb-2">logofood</h1>
        <h2 class="h5 text-muted mb-5 text-center">Βάλε τη διεύθυνσή σου για να δεις τα εστιατόρια</h2>

        <div class="address-box">
            <form id="landingForm">
                <div class="row g-2 mb-4">
                    <div class="col-12 col-md-6">
                        <label for="landingStreet" class="form-label fw-bold text-secondary">Οδός</label>
                        <input type="text" id="landingStreet" class="form-control form-control-lg" placeholder="π.χ. Ερμού" required>
                    </div>
                    <div class="col-6 col-md-3">
                        <label for="landingNumber" class="form-label fw-bold text-secondary">Αριθμός</label>
                        <input type="text" id="landingNumber" class="form-control form-control-lg" placeholder="12" required>
                    </div>
                    <div class="col-6 col-md-3">
                        <label for="landingZip" class="form-label fw-bold text-secondary">Τ.Κ.</label>
                        <input type="text" id="landingZip" class="form-control form-control-lg" placeholder="10563" required>
                    </div>
                </div>

                <div class="mb-3 position-relative">
                    <label for="landingAddressSearch" class="form-label">Αναζήτηση διεύθυνσης</label>
                    <input
                        type="text"
                        id="landingAddressSearch"
                        class="form-control"
                        placeholder="π.χ. Ερμού 12"
                        autocomplete="off"
                    >
                    <div id="landingAddressResults" class="list-group mt-2 d-none"></div>
                    </div>

                <div class="mb-4">

                    <button type="button" class="btn btn-sm btn-outline-secondary w-100 mb-2 fw-bold" id="toggleLandingMap">
                        📍 Επιλογή στο χάρτη
                    </button>
                    <div id="landingMapContainer" class="d-none shadow-sm rounded overflow-hidden mb-3" style="height: 250px; border: 1px solid #dee2e6;">
                        <div id="landingMap" style="height: 100%;"></div>
                    </div>
                </div>

                <button type="submit" class="btn btn-custom btn-lg w-100 fw-bold">Βρες Εστιατόρια</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/utils.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
