<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Εγγραφή - LogoFood</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <header class="custom-header py-4 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0 custom-header-text fw-bold">
                <a href="index.html" class="text-decoration-none text-dark">LogoFood</a>
            </h1>
            <div class="d-flex gap-2">
                <a href="cart.html" class="btn btn-custom btn-sm fw-bold">
                    Καλάθι <span class="badge custom-number ms-1">0</span>
                </a>
                <a href="login.html" class="btn btn-sm fw-bold text-dark">Σύνδεση/Εγγραφή</a>
            </div>
        </div>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card border-0 shadow-sm p-4">
                    <h2 class="fw-bold mb-4 text-center">Δημιουργία Λογαριασμού</h2>

                    <form>
                        <div class="row g-3">

                            <div class="col-md-6">
                                <label for="firstName" class="form-label text-muted small fw-bold">Όνομα</label>
                                <input type="text" id="firstName" class="form-control" placeholder="Γιώργος" required>
                            </div>

                            <div class="col-md-6">
                                <label for="lastName" class="form-label text-muted small fw-bold">Επώνυμο</label>
                                <input type="text" id="lastName" class="form-control" placeholder="Παπαδόπουλος" required>
                            </div>

                            <div class="col-12">
                                <label for="email" class="form-label text-muted small fw-bold">Email</label>
                                <input type="email" id="email" class="form-control" placeholder="example@example.com" required>
                            </div>

                            <div class="col-12">
                                <label for="password" class="form-label text-muted small fw-bold">Κωδικός Πρόσβασης</label>
                                <input type="password" id="password" class="form-control" placeholder="Τουλάχιστον 6 χαρακτήρες"
                                    required>
                            </div>

                            <div class="col-12">
                                <label for="confirmPassword" class="form-label text-muted small fw-bold">Επιβεβαίωση Κωδικού</label>
                                <input type="password" id="confirmPassword" class="form-control" placeholder="Επαναλάβετε τον κωδικό"
                                    required>
                            </div>

                            <div class="col-12">
                                <label for="phone" class="form-label text-muted small fw-bold">Τηλέφωνο</label>
                                <input type="tel" id="phone" class="form-control" placeholder="69xxxxxxxx" required>
                            </div>

                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-menu btn-lg w-100 fw-bold">Δημιουργία Λογαριασμού
                                </button>
                            </div>

                            <div class="col-12 text-center mt-3">
                                <a href="login.html" class="text-decoration-none text-muted small">Έχετε ήδη λογαριασμό?
                                    Συνδεθείτε</a>
                            </div>

                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
