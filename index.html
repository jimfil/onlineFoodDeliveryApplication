<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogoFood - Παραγγελία Φαγητού</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="css/style.css">
    
</head>

<body class="bg-light">
    <header class="custom-header py-4 py-md-3 py-lg-4 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h4 h5-md mb-0 custom-header-text fw-bold">
                <a href="index.html" class="text-decoration-none text-dark" id="logo">logofood</a>
            </h1>
            <div class="d-flex gap-2 gap-md-1">
                <a href="cart.html" class="btn btn-custom btn-sm fw-bold">
                    Καλάθι <span class="badge custom-number ms-1">0</span>
                </a>
                <a href="login.html" class="btn btn-sm fw-bold text-auth">Σύνδεση/Εγγραφή</a>
            </div>
        </div>
    </header>

    <section class="container my-5 text-center">
        <h2 class="slogan fw-bold mb-4">Είτε αλοιφή είτε σως, logofood τα έχει όλα</h2>
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="d-flex gap-2">
                    <input type="text" id="searchRestaurant" class="form-control form-control-lg"
                        placeholder="π.χ. Μαγαζί ή είδος φαγητού">
                    <button class="btn btn-menu btn-lg px-3">Go</button>
                </div>
            </div>
        </div>
    </section>

    <main class="container mb-5">
        <h3 class="h5 mb-3 text-secondary">Δημοφιλή Εστιατόρια κοντά σου</h3>

        <div class="row g-4">

            <div class="col-12 col-md-6 col-lg-3">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="bg-secondary text-white d-flex justify-content-center align-items-center rounded-top"
                        style="height: 160px;">
                        dasFei.png
                    </div>
                    <div class="card-body">
                        <h4 class="card-title h5 fw-bold mb-1">Burger House</h4>
                        <p class="card-text text-muted small mb-3">Burgers • Ελάχιστη 8€</p>
                        <a href="restaurant.html" class="btn btn-menu w-100 fw-bold">Δες το Μενού</a>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-3">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="bg-secondary text-white d-flex justify-content-center align-items-center rounded-top"
                        style="height: 160px;">
                        dasFei.png
                    </div>
                    <div class="card-body">
                        <h4 class="card-title h5 fw-bold mb-1">Pizza House</h4>
                        <p class="card-text text-muted small mb-3">Pizza • Ελάχιστη 7,5€</p>
                        <a href="#" class="btn btn-menu w-100 fw-bold">Δες το Μενού</a>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-3">
                <div class="card h-100 border-0 shadow-sm">
                    <div class="bg-secondary text-white d-flex justify-content-center align-items-center rounded-top"
                        style="height: 160px;">
                        dasFei.png
                    </div>
                    <div class="card-body">
                        <h4 class="card-title h5 fw-bold mb-1">Gyro House</h4>
                        <p class="card-text text-muted small mb-3">Σουβλάκια • Ελάχιστη 5€</p>
                        <a href="#" class="btn btn-menu w-100 fw-bold">Δες το Μενού</a>
                    </div>
                </div>
            </div>

        </div>
    </main>


</body>

</html>
